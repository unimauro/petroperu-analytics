<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#0a0e14"/>
  <rect width="1200" height="8" fill="#f5a623"/>

  <!-- Texto principal -->
  <text x="70" y="120" font-size="62" font-weight="700" fill="#f1f5f9">Petroperú <tspan fill="#f5a623">Analytics</tspan></text>
  <text x="72" y="166" font-size="25" fill="#94a3b8">Finanzas, operaciones y gobierno · 2005–2025</text>

  <!-- Chips -->
  <g font-size="22" fill="#cbd5e1">
    <rect x="72" y="200" width="200" height="44" rx="8" fill="#161d27" stroke="#1f2937"/>
    <text x="92" y="229">16 indicadores</text>
    <rect x="288" y="200" width="186" height="44" rx="8" fill="#161d27" stroke="#1f2937"/>
    <text x="308" y="229">5 dashboards</text>
    <rect x="490" y="200" width="232" height="44" rx="8" fill="#161d27" stroke="#1f2937"/>
    <text x="510" y="229">grafo de gobierno</text>
  </g>

  <!-- Alertas reales del análisis -->
  <g font-size="23">
    <text x="72" y="318" fill="#ef4444">● Patrimonio negativo</text>
    <text x="72" y="356" fill="#f5a623">● Deuda neta / EBITDA ≈ 50x</text>
    <text x="72" y="394" fill="#22d3ee">● Cobertura de intereses &lt; 1.0x</text>
  </g>

  <!-- Pill: juega a ser director -->
  <rect x="70" y="450" width="560" height="70" rx="35" fill="#a78bfa"/>
  <text x="104" y="494" font-size="30" font-weight="700" fill="#0a0e14">▶  JUEGA A SER DIRECTOR</text>
  <text x="72" y="556" font-size="22" fill="#94a3b8">¿Puedes reflotar Petroperú? Simulador de decisiones de gerencia.</text>

  <!-- Panel de gráfico (derecha) -->
  <g>
    <rect x="730" y="120" width="400" height="320" rx="14" fill="#0f141c" stroke="#1f2937"/>
    <text x="752" y="152" font-size="18" fill="#94a3b8">Resultado neto por año (US$ M)</text>
    <line x1="752" y1="300" x2="1108" y2="300" stroke="#2b3543" stroke-dasharray="4 4"/>
    <!-- barras: rojas (pérdida) bajo la línea, verdes (utilidad) sobre -->
    <g>
      <rect x="762" y="270" width="20" height="30" fill="#22c55e"/>
      <rect x="792" y="262" width="20" height="38" fill="#22c55e"/>
      <rect x="822" y="276" width="20" height="24" fill="#22c55e"/>
      <rect x="852" y="300" width="20" height="34" fill="#ef4444"/>
      <rect x="882" y="278" width="20" height="22" fill="#22c55e"/>
      <rect x="912" y="300" width="20" height="58" fill="#ef4444"/>
      <rect x="942" y="300" width="20" height="40" fill="#ef4444"/>
      <rect x="972" y="300" width="20" height="72" fill="#ef4444"/>
      <rect x="1002" y="300" width="20" height="44" fill="#ef4444"/>
      <rect x="1032" y="284" width="20" height="16" fill="#22c55e"/>
      <rect x="1062" y="266" width="20" height="34" fill="#22c55e"/>
    </g>
    <!-- línea de apalancamiento (violeta) -->
    <polyline points="772,200 832,210 892,196 952,186 1012,210 1072,228" fill="none" stroke="#a78bfa" stroke-width="3"/>
    <text x="752" y="420" font-size="15" fill="#64748b">Verde = utilidad · Rojo = pérdida · línea = apalancamiento</text>
  </g>

  <!-- Footer -->
  <text x="72" y="592" font-size="21" fill="#64748b">unimauro.github.io/petroperu-analytics · código abierto</text>
  <text x="1130" y="592" font-size="21" fill="#64748b" text-anchor="end">por Carlos Cárdenas Fernández · @unimauro</text>
</svg>
